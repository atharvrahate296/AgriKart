name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'frontend/package.json'

    - name: Install Dependencies
      run: |
        cd frontend
        npm install

    - name: Run Lint
      run: |
        cd frontend
        npm run lint

    - name: Build Next.js Application
      run: |
        cd frontend
        npm run build
