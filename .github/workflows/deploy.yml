name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  validate_all:
    name: Run Complete Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup Node.js Environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # 2. Setup Python Environment
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Validate Next.js Frontend
    - name: Validate Frontend
      run: |
        cd frontend
        npm install
        npm run lint
        npm run build

    # 4. Validate Express Backend
    - name: Validate Backend
      run: |
        cd backend
        npm install
        npm run type-check
        npm test

    # 5. Validate FastAPI ML Service
    - name: Validate ML Service
      run: |
        python -m pip install --upgrade pip
        pip install -r ml/requirements.txt pytest httpx
        python -m pytest ml/tests

    # 6. Validate FastAPI LLM Service
    - name: Validate LLM Service
      run: |
        pip install -r llm/requirements.txt pytest httpx
        python -m pytest llm/tests

  deploy:
    name: Production Deployment Orchestration
    needs: validate_all
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Deploy Database Migrations to Supabase
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Run Supabase Migrations
      run: |
        supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

    # 2. Deploy Next.js Frontend to Vercel
    - name: Deploy Frontend to Vercel
      run: |
        npm install --global vercel
        vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    # 3. Deploy Express Backend, ML, and LLM Services to Railway
    - name: Install Railway CLI
      run: npm install --global @railway/cli

    - name: Deploy Express Backend to Railway
      run: |
        cd backend
        railway up --service backend --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Deploy FastAPI ML Service to Railway
      run: |
        cd ml
        railway up --service ml-service --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Deploy FastAPI LLM Service to Railway
      run: |
        cd llm
        railway up --service llm-service --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
