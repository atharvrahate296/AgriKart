name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Test & Type-Check Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'backend/package.json'

    - name: Install Dependencies
      run: |
        cd backend
        npm install

    - name: Run TypeScript Type-Check
      run: |
        cd backend
        npm run type-check

    - name: Run Vitest Tests
      run: |
        cd backend
        npm test
